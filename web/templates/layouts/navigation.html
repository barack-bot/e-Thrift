<!-- Global navigation mega-menu (Men, Women, Kids structures) -->
<nav class="navbar" id="navbar">
  <div class="navbar-container">
    <div class="navbar-logo">
      <a href="/">
        <span class="logo-green">e</span><span class="logo-dark">-Thrift</span>
      </a>
    </div>
    <div class="navbar-search">
      <form action="/search" method="GET" hx-get="/search" hx-trigger="keyup changed delay:500ms" hx-target="#search-results" hx-indicator="#search-loading">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text"
            name="q"
            placeholder="search products..."
            class="search-input"
            aria-label="search products">
            <div class="search-loading" id="search-loading" style="display: none;">
              <i class="fas fa-circle-notch fa-spin"></i>
            </div>
        </div>
        <div id="search-results" class="search-results"></div>
      </form>
    </div>
    <div class="navbar-actions">
      <div class="dropdown">
        <button class="dropdown-toggle" id="accountDropdown">
          <i class="fas fa-user"></i>
          <span class="dropdown-text">Account</span>
          <i class="fas fa-chevron-down"></i>
        </button>
        <div class="dropdown-menu" id="accountMenu">
          <a href="/orders" class="dropdown-item">
            <i class="fas fa-box"></i>My Orders
          </a>
          <a href="/wishlist" class="dropdown-item">
            <i class="fas fa-heart"></i>Wishlist
          </a>
        </div>
      </div>
      <a href="/cart-button" hx-get="/api/cart/count" hx-trigger="load, cart-updated from:body" hx-target="#cart-count" hx-swap="innerHTML">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-text">cart</span>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </div>
  <div class="navbar-categories" id="navbarCategories">
    <div class="categories-container">
      <a href="/category/men" class="category-link">
        <i class="fas fa-male"></i> Men
      </a>
      <a href="/category/women" class="category-link">
        <i class="fas fa-female"></i> Women
      </a>
      <a href="/category/sale" class="category-link sale-link">
        <i class="fas fa-tag"></i> Sale
        <span class="sale-badge">HOT</span>
      </a>
    </div>
  </div>
</nav>
<div class="mobile-sidebar" id="mobileSidebar">
    <div class="mobile-sidebar-header">
        <h3>KE-STORE</h3>
        <button class="close-sidebar" id="closeSidebarBtn">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="mobile-sidebar-content">
        <!-- Categories for mobile -->
        <div class="mobile-categories">
            <a href="/category/men" class="mobile-category-link">
                <i class="fas fa-male"></i> Men
            </a>
            <a href="/category/women" class="mobile-category-link">
                <i class="fas fa-female"></i> Women
            </a>
            <a href="/category/kids" class="mobile-category-link">
                <i class="fas fa-child"></i> Kids
              <a href="/category/sale" class="mobile-category-link sale-link">
                <i class="fas fa-tag"></i> Sale
            </a>
        </div>
<div class="mobile-overlay" id="mobileOverlay"></div>

      <script>
        (function() {
          document.addEventListener('DOMContentLoaded', function() {
            const dropdownBtn = document.getElementById('accountDropdown');
            const dropdownMenu = document.getElementById('accountMenu');

            if (dropdownBtn && dropdownMenu) {
              dropdownBtn.addEventListener('click',function(e) {
                e.stopPropagation();
                dropdownMenu.classList.toggle('show');
            });
           //close dropdown
          document.addEventListener('click' function(){
            dropdownMenu.classlist.remove('show');
          });
              dropdownMenu.addEventListener('click', function(e) {
                e.stopPropagation();
              });
            }

            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const mobileSidebar = document.getElementById('mobileSider');
            const mobileOverlay = document.getElementById('mobileOverlay')
            const closeSidebarBtn = document.getElementById('closeSidebarBtn');

            function openMobileSidebar() {
              mobileSidebar.classList.add('open');
              mobileOverlay.classList.add('show');
              document.body.style.overflow = 'hidden';
            }

            function closeMobileSidebar() {
              mobileSidebar.classList.remove('open');
              mobileOverlay.classList.remove('show');
              document.body.style.overflow = '';
            }

            if (mobileMenuBtn) {
              mobileMenuBtn.addEventListener('click', openSidebar);
            }
            if (closeSidebarBtn) {
              closeSidebarBtn.addEventListener('click' , closeMobileSidebar);
            }
            if (mobileOverlay) {
              mobileOverlay.addEventListener('click', closeMobileSidebar);
            }

            const navbar = document.getElementById('navbar');
            let lastScroll = 0;

            window.addEventListener('scroll', function() {
              const currentScroll = window.pageYOffset;

              if (currentScroll > 100) {
                navbar.classList.add('navbar-sticky');
                if (currentScroll > lastScroll && currentScroll > 300)
                {
                  navbar.classList.add('navbar-hidden');
                }else {
                  navbar.classList.remove('navbar-hidden');
                }
              }else{
                navbar.classList.remove('navbar-sticky');
                navbar.classList.remove('navbar-hidden');
              }
              lastScroll = currentScroll;
            });


            const searchInput = document.querySelector('.search-input');
            const searchWrapper = document.querySelector('.search-wrapper');

            if (searchInput) {
              searchInput.addEventListener('focus', function() {
                searchWrapper.classLisr.add('focused');
              });

              searchInput.addEventListener('blur', function() {
                setTimeout(() => {
                  searchWrapper.classList.removed('focused');
                }, 200);
              });
            }
          });
        })();
      </script>
                                             
            
      </script>
