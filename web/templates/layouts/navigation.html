<!-- Global navigation bar: logo, search, account dropdown, cart, category row -->
<nav class="navbar" id="navbar">

    <!-- TOP ROW: logo / search / actions -->
    <div class="navbar-container">

        <!-- LOGO -->
        <div class="navbar-logo">
            <a href="/">
                <!-- Hanger icon mirrors the sketch -->
                <span class="logo-icon"><i class="fas fa-tshirt"></i></span>
                <span class="logo-green">e</span><span class="logo-dark">-Thrift</span>
                <span class="logo-tag">Live</span>
            </a>
        </div>

        <!-- SEARCH (hidden on mobile, shown via JS toggle) -->
        <div class="navbar-search">
            <form
                action="/search"
                method="GET"
                hx-get="/search"
                hx-trigger="keyup changed delay:400ms"
                hx-target="#search-results"
                hx-indicator="#search-loading"
            >
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input
                        type="text"
                        name="q"
                        placeholder="Search brands, items, sizes..."
                        class="search-input"
                        autocomplete="off"
                        aria-label="Search products"
                    >
                    <span class="search-loading" id="search-loading">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </div>
                <!-- HTMX injects results here -->
                <div id="search-results" class="search-results"></div>
            </form>
        </div>

        <!-- ACTIONS: account, wishlist, cart, hamburger -->
        <div class="navbar-actions">

            <!-- Account dropdown -->
            <div class="dropdown">
                <button class="dropdown-toggle icon-action" id="accountDropdown" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-user"></i>
                    <span class="dropdown-text">Account</span>
                    <i class="fas fa-chevron-down" style="font-size:0.65rem;"></i>
                </button>
                <div class="dropdown-menu" id="accountMenu" role="menu">
                    <a href="/login"    class="dropdown-item"><i class="fas fa-sign-in-alt"></i> Sign In</a>
                    <a href="/register" class="dropdown-item"><i class="fas fa-user-plus"></i> Register</a>
                    <a href="/orders"   class="dropdown-item"><i class="fas fa-box"></i> My Orders</a>
                    <a href="/wishlist" class="dropdown-item"><i class="fas fa-heart"></i> Wishlist</a>
                    <a href="/sell"     class="dropdown-item"><i class="fas fa-plus-circle"></i> Sell an Item</a>
                </div>
            </div>

            <!-- Wishlist shortcut -->
            <button class="icon-action" aria-label="Wishlist">
                <i class="fas fa-heart"></i>
            </button>

            <!-- Cart — HTMX polls count on load and on cart-updated event -->
            <a
                href="/cart"
                class="icon-action cart-button"
                aria-label="Shopping cart"
                hx-get="/api/cart/count"
                hx-trigger="load, cart-updated from:body"
                hx-target="#cart-count"
                hx-swap="innerHTML"
            >
                <i class="fas fa-shopping-cart"></i>
                <span>Cart</span>
                <span class="cart-badge" id="cart-count">0</span>
            </a>

            <!-- Hamburger (mobile only) -->
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
                <i class="fas fa-bars"></i>
            </button>

        </div>
    </div>

    <!-- CATEGORIES ROW (desktop only) -->
    <div class="navbar-categories" id="navbarCategories">
        <div class="categories-container">
            <a href="/category/men"         class="category-link"><i class="fas fa-male fa-fw"></i> Men</a>
            <a href="/category/women"       class="category-link"><i class="fas fa-female fa-fw"></i> Women</a>
            <a href="/category/kids"        class="category-link"><i class="fas fa-child fa-fw"></i> Kids</a>
            <a href="/category/accessories" class="category-link"><i class="fas fa-glasses fa-fw"></i> Accessories</a>
            <a href="/category/shoes"       class="category-link"><i class="fas fa-shoe-prints fa-fw"></i> Shoes</a>
            <a href="/category/bags"        class="category-link"><i class="fas fa-shopping-bag fa-fw"></i> Bags</a>
            <a href="/category/sale"        class="category-link sale-link">
                <i class="fas fa-tag fa-fw"></i> Sale
                <span class="sale-badge">HOT</span>
            </a>
        </div>
    </div>

</nav>
